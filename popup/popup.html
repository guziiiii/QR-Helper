<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
      width: 320px;
      padding: 14px 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #1976D2;
    }

    .setting-group {
      margin-bottom: 12px;
    }

    .setting-group:last-child {
      margin-bottom: 0;
    }

    .setting-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
    }

    .setting-item input[type="checkbox"] {
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .setting-item label {
      line-height: 1.5;
      cursor: pointer;
      user-select: none;
      flex: 1;
    }

    .sub-options {
      margin-left: 24px;
      margin-bottom: 4px;
    }

    .sub-options .setting-item {
      padding: 4px 0;
    }

    .sub-options input[type="radio"] {
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .sub-options label {
      font-size: 12px;
      color: #555;
      cursor: pointer;
    }

    .footer {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #eee;
      text-align: center;
      font-size: 10px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 id="popup-title"></h1>
  </div>

  <!-- 长按扫描开关 -->
  <div class="setting-group">
    <div class="setting-item">
      <input type="checkbox" id="enable-long-press" />
      <label for="enable-long-press" id="label-enable-long-press"></label>
    </div>
  </div>

  <!-- 自动打开 URL + 打开方式 -->
  <div class="setting-group">
    <div class="setting-item">
      <input type="checkbox" id="auto-open-url" />
      <label for="auto-open-url" id="label-auto-open-url"></label>
    </div>
    <div class="sub-options" id="open-method-section">
      <div class="setting-item">
        <input type="radio" name="open-method" id="open-new-tab" value="new-tab" />
        <label for="open-new-tab" id="label-open-new-tab"></label>
      </div>
      <div class="setting-item">
        <input type="radio" name="open-method" id="open-current-tab" value="current-tab" />
        <label for="open-current-tab" id="label-open-current-tab"></label>
      </div>
    </div>
  </div>

  <div class="footer">QR Helper v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
